<script>
    // Taruh URL Google Web App Anda di bawah ini
    const API_URL = "https://script.google.com/macros/s/AKfycbxZaJNYzZx8XQs7qYTa9lNTEuW4yXq4J-QNwUbh0QvKpBqeIVA83BJqrBYZT0utIjMB2g/exec";

    let currentUser = null;
    let globalUsersData = []; // Menyimpan memori lokal agar tidak perlu loading berulang

    function toggleLoading(show) {
        document.getElementById('loading').style.display = show ? 'block' : 'none';
    }

    function switchCard(cardId) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        document.getElementById(cardId).classList.add('active');
    }

    // Fungsi kirim data secara diam-diam (Background Sync) - Tanpa mengunci layar
    function sendRequest(data) {
        fetch(API_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        }).catch(e => console.log("Background sync berjalan"));
    }

    // Fungsi ambil data utama (Hanya dipanggil saat Login)
    async function fetchDatabase() {
        toggleLoading(true);
        try {
            let response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ action: "getValidatedData" })
            });
            let data = await response.json();
            toggleLoading(false);
            return data;
        } catch(e) {
            toggleLoading(false);
            return [];
        }
    }

    async function register() {
        const nama = document.getElementById('regNama').value.trim();
        const nip = document.getElementById('regNip').value.trim();
        const username = document.getElementById('regUsername').value.trim().toLowerCase();

        if(!nama || !nip || !username) return alert("⚠️ Mohon lengkapi seluruh kolom registrasi!");
        if(username === "luf3159" || nip === "199805302025061001") return alert("⚠️ Kredensial Admin Utama Dilindungi!");

        toggleLoading(true);
        globalUsersData = await fetchDatabase();
        if (globalUsersData.some(u => u.username === username || u.nip === nip)) {
            toggleLoading(false);
            return alert("⚠️ Username/NIP sudah terdaftar!");
        }

        await fetch(API_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: "register", nama: nama, nip: nip, username: username })
        });
        toggleLoading(false);
        
        alert("🎉 Registrasi sukses tersimpan! Silakan login.");
        switchCard('loginCard');
    }

    async function login() {
        const usernameInput = document.getElementById('loginUsername').value.replace(/\s+/g, '').toLowerCase();
        if(!usernameInput) return alert("⚠️ Masukkan username!");

        // Logika Khusus Admin Utama
        if (usernameInput === "luf3159") {
            currentUser = { nama: "Admin Utama", nip: "199805302025061001", username: "luf3159", accounts: [] };
            document.getElementById('welcomeText').innerHTML = `Halo, <strong>Admin Utama</strong> <span class="badge-admin">Admin Mode</span> 👋`;
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('userCrudSection').style.display = 'none';
            globalUsersData = await fetchDatabase(); // Ambil data untuk tabel pegawai lain
            renderTable(); // Render instan
            switchCard('dashboardCard');
            return;
        }

        // Ambil data hanya sekali saat login
        globalUsersData = await fetchDatabase();
        const user = globalUsersData.find(u => u.username === usernameInput);
        
        if (user) {
            currentUser = user;
            document.getElementById('welcomeText').innerHTML = `Halo, <strong>${user.nama}</strong> 👋`;
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('userCrudSection').style.display = 'block';
            renderTable(); // Render instan dari memori
            switchCard('dashboardCard');
        } else {
            alert(`❌ Username "${usernameInput}" tidak ditemukan!`);
        }
    }

    // Fungsi render sekarang sinkron (Instan 0 detik)
    function renderTable() {
        if (!currentUser) return; 
        
        const tbody = document.getElementById('passwordTableBody');
        tbody.innerHTML = "";

        const userAccounts = currentUser.accounts || [];
        document.getElementById('accountCounter').innerText = `${userAccounts.length} / 10 Akun`;

        // Render Akun Pribadi Anda
        userAccounts.forEach((acc) => {
            const tr = document.createElement('tr');
            tr.classList.add('highlight');
            tr.innerHTML = `
                <td><strong>${currentUser.nama}</strong><br><small style="color:var(--text-muted)">NIP: ${currentUser.nip} <span class="badge-me">Anda</span></small></td>
                <td style="font-weight:600;">${acc.platform}</td>
                <td style="font-weight:500; color: #475569;">${acc.userWeb}</td>
                <td><span style="color: var(--primary); font-weight:600;">${acc.pass}</span></td>
                <td><button class="btn-danger btn-del" onclick="deleteAccount('${acc.platform}', '${acc.userWeb}')">Hapus</button></td>
            `;
            tbody.appendChild(tr);
        });

        // Render Akun Pegawai Lain dari Memori Lokal
        globalUsersData.filter(u => u.nip !== currentUser.nip && u.username !== "luf3159").forEach(otherUser => {
            (otherUser.accounts || []).forEach(acc => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${otherUser.nama}</strong><br><small style="color:var(--text-muted)">NIP: ${otherUser.nip}</small></td>
                    <td>${acc.platform}</td>
                    <td><span class="blur">••••••••••••</span></td>
                    <td><span class="blur">••••••••••••</span></td>
                    <td>-</td>
                `;
                tbody.appendChild(tr);
            });
        });
    }

    function addOrUpdateAccount() {
        const platform = document.getElementById('inputPlatform').value.trim();
        const userWeb = document.getElementById('inputUserWeb').value.trim();
        const pass = document.getElementById('inputPassword').value.trim();

        if(!platform || !userWeb || !pass) return alert("⚠️ Isi semua kolom website, username, dan password!");

        // 1. UPDATE MEMORI LOKAL SEKETIKA
        if (!currentUser.accounts) currentUser.accounts = [];
        let isUpdate = false;
        
        for (let i = 0; i < currentUser.accounts.length; i++) {
            if (currentUser.accounts[i].platform.toLowerCase() === platform.toLowerCase() && 
                currentUser.accounts[i].userWeb.toLowerCase() === userWeb.toLowerCase()) {
                currentUser.accounts[i].pass = pass; 
                isUpdate = true;
                break;
            }
        }

        if (!isUpdate) {
            if (currentUser.accounts.length >= 10) return alert("❌ Batas Maksimal 10 Akun Tercapai!");
            currentUser.accounts.push({ platform, userWeb, pass });
        }

        // 2. PERBARUI LAYAR DALAM 0 DETIK
        document.getElementById('inputPlatform').value = '';
        document.getElementById('inputUserWeb').value = '';
        document.getElementById('inputPassword').value = '';
        renderTable();

        // 3. KIRIM KE GOOGLE SHEETS DIAM-DIAM DI LATAR BELAKANG
        sendRequest({ action: "addOrUpdateAccount", nip: currentUser.nip, platform: platform, userWeb: userWeb, pass: pass });
    }

    function deleteAccount(platformName, userWebName) {
        if(!confirm(`Hapus akun ${platformName} dengan username ${userWebName}?`)) return;
        
        // 1. HAPUS DARI MEMORI LOKAL & PERBARUI LAYAR SEKETIKA
        currentUser.accounts = currentUser.accounts.filter(acc => 
            !(acc.platform === platformName && acc.userWeb === userWebName)
        );
        renderTable();

        // 2. HAPUS DI GOOGLE SHEETS SECARA DIAM-DIAM
        sendRequest({ action: "deleteAccount", nip: currentUser.nip, platform: platformName, userWeb: userWebName });
    }

    function logout() {
        currentUser = null;
        document.getElementById('loginUsername').value = "";
        document.getElementById('adminPanel').style.display = 'none';
        switchCard('loginCard');
    }

    let adminPegawaiIndex = null;
    
    async function adminCariPegawai() {
        const searchNip = document.getElementById('adminSearchNip').value.trim();
        if(!searchNip) return alert("⚠️ Isi nomor NIP!");

        adminPegawaiIndex = globalUsersData.findIndex(u => u.nip === searchNip);
        
        if(adminPegawaiIndex !== -1) {
            document.getElementById('adminNamaPegawai').innerText = globalUsersData[adminPegawaiIndex].nama;
            document.getElementById('adminNewUsername').value = globalUsersData[adminPegawaiIndex].username;
            document.getElementById('adminEditForm').style.display = 'block';
        } else {
            alert("❌ Pegawai tidak ditemukan.");
            document.getElementById('adminEditForm').style.display = 'none';
        }
    }

    function adminUpdateUsername() {
        const newUsername = document.getElementById('adminNewUsername').value.trim().toLowerCase();
        if(!newUsername) return alert("⚠️ Username baru kosong!");

        const isExist = globalUsersData.some((u, idx) => u.username === newUsername && idx !== adminPegawaiIndex);
        if(isExist) return alert("⚠️ Username sudah terpakai.");

        // Update Memori Lokal (Instan)
        globalUsersData[adminPegawaiIndex].username = newUsername;
        
        // Kirim ke cloud diam-diam
        sendRequest({ action: "adminUpdateUsername", nip: globalUsersData[adminPegawaiIndex].nip, newUsername: newUsername });
        
        alert("✅ Username berhasil diperbarui!");
        document.getElementById('adminEditForm').style.display = 'none';
        document.getElementById('adminSearchNip').value = "";
    }
</script>
